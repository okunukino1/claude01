name: Indeed 日次アナリティクス取得

on:
  schedule:
    # 毎朝10:00 JST (01:00 UTC) に実行
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "対象日 (YYYY-MM-DD)。省略すると前日"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリのインストール
        run: |
          pip install -r requirements-indeed.txt
          playwright install chromium

      - name: Chromium システム依存パッケージのインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 \
            libcairo2 libcups2 libdbus-1-3 libdrm2 libgbm1 libglib2.0-0 \
            libnspr4 libnss3 libpango-1.0-0 libx11-6 libxcb1 libxcomposite1 \
            libxdamage1 libxext6 libxfixes3 libxkbcommon0 libxrandr2 \
            fonts-liberation xvfb

      - name: Indeed データ取得 → スプレッドシート転記
        env:
          INDEED_EMAIL:                ${{ secrets.INDEED_EMAIL }}
          INDEED_PASSWORD:             ${{ secrets.INDEED_PASSWORD }}
          SPREADSHEET_ID:              ${{ secrets.INDEED_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_GID:                   "1404155345"
          TARGET_DATE:                 ${{ github.event.inputs.target_date }}
        run: python scripts/indeed_scraper.py

      - name: デバッグ成果物を保存（失敗時のみ）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-${{ github.run_id }}
          path: |
            debug_*.png
            debug_*.json
            debug_*.html
          retention-days: 7
