name: Promote current test app to production once

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/promote-test-to-prod-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Promote test index to production index
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('delivery_map_mapbox')
          version = 'v2026.06.16-1'
          cache = '20260616-1'

          text = (root / 'test/index.html').read_text(encoding='utf-8')
          replacements = {
              '<title>RYS配送マップ (テスト版)</title>': '<title>RYS配送マップ</title>',
              'manifest.webmanifest?v=20260610-test-6': f'manifest.webmanifest?v={cache}',
              'app-icon-192.png?v=20260610-test-6': f'app-icon-192.png?v={cache}',
              'app-icon-512.png?v=20260610-test-6': f'app-icon-512.png?v={cache}',
              "'rys-mapbox-test-": "'rys-mapbox-",
              '"rys-mapbox-test-': '"rys-mapbox-',
              "const DELIVERY_SYNC_API = '../api/delivery_sync.php';": "const DELIVERY_SYNC_API = 'api/delivery_sync.php';",
              "const SHARED_GEOCODE_CACHE_API = '../api/delivery_geocode_cache_test.php';": "const SHARED_GEOCODE_CACHE_API = 'api/delivery_geocode_cache.php';",
              '../api/': 'api/',
              'RYS配送マップ テスト版': 'RYS配送マップ',
              'RYSテスト': 'RYS配送',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          text = re.sub(
              r'<h1>RYS配送マップ<span class="badge-test">テスト版</span><span class="app-version" id="app-version-label">[^<]+</span></h1>',
              f'<h1>RYS配送マップ<span class="app-version" id="app-version-label">{version}</span></h1>',
              text,
          )
          text = re.sub(
              r'現在のバージョン: <span id="menu-app-version">[^<]+</span>',
              f'現在のバージョン: <span id="menu-app-version">{version}</span>',
              text,
          )
          text = re.sub(r"const APP_VERSION = '[^']+';", f"const APP_VERSION = '{version}';", text)

          forbidden = ['rys-mapbox-test-', '../api/', 'delivery_geocode_cache_test.php', 'v2026.06.12-test']
          found = [s for s in forbidden if s in text]
          if found:
              raise SystemExit('Production index still contains test-only strings: ' + ', '.join(found))

          (root / 'index.html').write_text(text, encoding='utf-8', newline='\n')

          for rel in ['manifest.webmanifest', 'service-worker.js']:
              path = root / rel
              if not path.exists():
                  continue
              s = path.read_text(encoding='utf-8')
              s = re.sub(r'app-icon-192\.png\?v=[^"\']+', f'app-icon-192.png?v={cache}', s)
              s = re.sub(r'app-icon-512\.png\?v=[^"\']+', f'app-icon-512.png?v={cache}', s)
              path.write_text(s, encoding='utf-8', newline='\n')

          wf = Path('.github/workflows/promote-test-to-prod-once.yml')
          if wf.exists():
              wf.unlink()
          PY

      - name: Commit promoted production app
        run: |
          git config user.name "codex-promotion-bot"
          git config user.email "codex-promotion-bot@users.noreply.github.com"
          git add delivery_map_mapbox/index.html delivery_map_mapbox/manifest.webmanifest delivery_map_mapbox/service-worker.js .github/workflows/promote-test-to-prod-once.yml
          git commit -m "Promote current test app to production v2026.06.16-1"
          git push

      - name: Set up PHP for Web Push dependencies
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2

      - name: Install Web Push dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --working-dir=delivery_map_mapbox

      - name: FTP Deploy to お名前.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./delivery_map_mapbox/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/config.php
            **/.git*
            **/node_modules/**
            **/data/private/*.json
            **/game/tools/**
            **/vendor/**/.github/**
            **/vendor/**/docs/**
            **/vendor/**/test/**
            **/vendor/**/tests/**
            **/vendor/**/*.md
            **/vendor/**/LICENSE*
            **/vendor/**/composer.json
            **/vendor/**/*.lock
            **/vendor/**/*.neon
            **/vendor/**/*.xml
            **/vendor/**/.coveralls.yml
            **/vendor/**/.styleci.yml
            **/vendor/**/.travis.yml
          log-level: standard

      - name: Refresh spot pickup cache
        continue-on-error: true
        run: |
          if [ -n "$SPOT_PICKUP_REFRESH_URL" ]; then
            curl --fail --show-error --silent --max-time 60 "$SPOT_PICKUP_REFRESH_URL"
          else
            echo "SPOT_PICKUP_REFRESH_URL is not set; skipping spot pickup refresh."
          fi
        env:
          SPOT_PICKUP_REFRESH_URL: ${{ secrets.SPOT_PICKUP_REFRESH_URL }}
