name: Refresh ecohai spot pickups

on:
  schedule:
    # JST 00:05 (UTC 15:05) clears the previous day's spot pickup sheet.
    - cron: '5 15 * * *'
    # JST 07:00-08:50 (UTC 22:00-23:50 on the previous day).
    - cron: '*/10 22,23 * * *'
    # JST 09:00-17:50 (UTC 00:00-08:50).
    - cron: '*/10 0-8 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh spot pickup cache
        run: |
          curl --fail --show-error --silent --max-time 60 "$SPOT_PICKUP_REFRESH_URL"
        env:
          SPOT_PICKUP_REFRESH_URL: ${{ secrets.SPOT_PICKUP_REFRESH_URL }}
