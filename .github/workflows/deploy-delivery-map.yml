name: Deploy delivery_map_mapbox to お名前.com

on:
  push:
    branches:
      - main
    paths:
      - 'delivery_map_mapbox/**'
      - '.github/workflows/deploy-delivery-map.yml'
  workflow_dispatch:  # 手動実行ボタンも有効化

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP for Web Push dependencies
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2

      - name: Install Web Push dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --working-dir=delivery_map_mapbox

      - name: FTP Deploy to お名前.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./delivery_map_mapbox/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/config.php
            **/.git*
            **/node_modules/**
            **/data/private/*.json
          log-level: standard

      - name: Refresh spot pickup cache
        run: |
          if [ -n "$SPOT_PICKUP_REFRESH_URL" ]; then
            curl --fail --show-error --silent --max-time 60 "$SPOT_PICKUP_REFRESH_URL"
          else
            echo "SPOT_PICKUP_REFRESH_URL is not set; skipping spot pickup refresh."
          fi
        env:
          SPOT_PICKUP_REFRESH_URL: ${{ secrets.SPOT_PICKUP_REFRESH_URL }}
