services:
  - type: web
    name: company-chat
    runtime: node
    buildCommand: cd chat-app && npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: cd chat-app && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: company-chat-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: company-chat-db
    databaseName: chat_db
    user: chat_user
    plan: free
